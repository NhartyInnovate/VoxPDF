<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "AudioFlow" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{{ body_class|default('theme-dark') }}">
  {% block page %}{% endblock %}
    <footer class="site-footer mt-5">
  <div class="container py-4">
    <div class="row align-items-center text-center text-md-start">

      <!-- Left: Brand -->
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="d-flex align-items-center justify-content-center justify-content-md-start gap-2">
          <div class="footer-logo">🎙</div>
          <span class="fw-bold footer-brand">AudioFlow</span>
        </div>
        <small class="footer-text d-block mt-2">
          Turn documents into audio effortlessly.
        </small>
      </div>

      <!-- Center: Links -->
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="d-flex justify-content-center gap-4 footer-links">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Support</a>
        </div>
      </div>

      <!-- Right: Copyright -->
      <div class="col-md-4 text-center text-md-end">
        <small class="footer-text">
          © {{ 2026 }} AudioFlow. All rights reserved.
        </small>
      </div>

    </div>
  </div>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
